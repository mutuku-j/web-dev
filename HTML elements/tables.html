<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Table Example</title>
  <style>
    header {
      background-color: black;
      display: flex;
      gap: 20px;
      height: 100px;
      justify-content: center;
      align-items: center;
    }

    header a {
      text-decoration: none;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid black;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    footer {
      background-color: black;
      color: white;
      font-size: 2rem;
      height: 100px;
      justify-items: center;
      align-content: center;
      position: fixed;
      width: 100%;
      bottom: 0;
    }
  </style>
</head>
<header>
  <a href="index.html">HOME</a>
  <a href="ordered list.html">ORDERED LIST</a>
  <a href="un ordered list.html">UN ORDERED LIST</a>
  <a href="images.html">IMAGES</a>
  <a href="links.html">LINKS</a>
  <a href="formating effects.html">FORMATTING EFFECTS</a>
  <a href="tables.html">TABLES</a>
</header>

<body>

  <h2>Employee Information</h2>

  <table>
    <tr>
      <th>Name</th>
      <th>Department</th>
      <th>Salary</th>
    </tr>
    <tr>
      <td>John Doe</td>
      <td>IT</td>
      <td>50,000</td>
    </tr>
    <tr>
      <td>Jane Smith</td>
      <td>Marketing</td>
      <td>60,000</td>
    </tr>
    <tr>
      <td>David Lee</td>
      <td>HR</td>
      <td>55,000</td>
    </tr>
  </table>

  <footer>
    <p>Group 8</p>
  </footer>
</body>

</html>
